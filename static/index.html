<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>保险条款问答 · Insurance RAG Playground</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #fff; --ink: #1f2430; --muted: #6b7280;
    --line: #e5e7eb; --brand: #2563eb; --brand-ink: #fff; --warn: #b45309;
    --ok: #047857; --refuse-bg: #fef3c7;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 15px/1.7 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  header { background: var(--card); border-bottom: 1px solid var(--line);
           padding: 12px 20px; display: flex; align-items: center; gap: 20px; }
  header h1 { font-size: 17px; margin: 0; }
  nav button { border: 0; background: none; font-size: 15px; padding: 8px 12px;
               cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  nav button.active { color: var(--brand); border-color: var(--brand); font-weight: 600; }
  main { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  .view { display: none; }
  .view.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
          padding: 16px; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  select, input[type=text] { border: 1px solid var(--line); border-radius: 8px;
          padding: 8px 10px; font-size: 14px; background: #fff; }
  input[type=text] { flex: 1; min-width: 240px; }
  button.primary { background: var(--brand); color: var(--brand-ink); border: 0;
          border-radius: 8px; padding: 9px 18px; font-size: 14px; cursor: pointer; }
  button.primary:disabled { opacity: .5; cursor: wait; }
  label.dim { font-size: 13px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  .answer { white-space: pre-wrap; word-break: break-word; }
  .badge { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px;
           background: #eef2ff; color: #3730a3; margin-right: 6px; }
  .badge.warn { background: var(--refuse-bg); color: var(--warn); }
  .badge.ok { background: #ecfdf5; color: var(--ok); }
  .cite { display: inline-block; margin: 4px 6px 0 0; font-size: 12px; cursor: pointer;
          border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px;
          background: #f9fafb; }
  .cite:hover { border-color: var(--brand); color: var(--brand); }
  .chunk { border-top: 1px dashed var(--line); padding: 8px 0; font-size: 13px; }
  .chunk .meta { color: var(--muted); font-size: 12px; }
  .chunk .prov { color: #4f46e5; font-size: 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .cols { grid-template-columns: 1fr; } }
  dialog { border: 1px solid var(--line); border-radius: 10px; max-width: 640px;
           padding: 18px; }
  dialog::backdrop { background: rgba(0,0,0,.35); }
  .muted { color: var(--muted); font-size: 13px; }
  details summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  /* 语料视图 */
  .doc-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 8px 10px;
             border-radius: 8px; cursor: pointer; font-size: 13px; }
  .doc-row:hover { background: #f3f4f6; }
  .chip { font-size: 12px; padding: 3px 10px; border: 1px solid var(--line); border-radius: 999px;
          cursor: pointer; background: #fff; }
  .chip.on { background: #eef2ff; border-color: var(--brand); color: var(--brand); font-weight: 600; }
  button.chip { font-family: inherit; }
  .cchunk { border: 1px solid var(--line); border-radius: 8px; margin-top: 8px; font-size: 13px; }
  .cchunk .head { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 8px 10px; }
  .cchunk .body { padding: 0 10px 8px; color: #374151; }
  .cid { font-family: ui-monospace, monospace; font-size: 12px; background: #e1f5ee;
         color: #085041; padding: 1px 7px; border-radius: 4px; }
  .clause-tag { color: #0f6e56; font-weight: 600; }
  .fbadge { font-size: 12px; padding: 1px 7px; border-radius: 4px;
            background: var(--refuse-bg); color: var(--warn); }
  .boundary { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 6px 10px;
              background: #fdecec; color: #991b1b; font-size: 12px;
              border-top: 1px dashed #fca5a5; border-radius: 0 0 8px 8px; }
  .boundary code { font-family: ui-monospace, monospace; }
  .flash { outline: 2px solid var(--brand); }
</style>
</head>
<body>
<header>
  <h1>保险条款问答</h1>
  <nav>
    <button data-view="chat" class="active">问答</button>
    <button data-view="playground">Playground 对照</button>
    <button data-view="eval">评测</button>
    <button data-view="corpus">语料</button>
  </nav>
</header>
<main>

  <!-- 问答视图 -->
  <section id="view-chat" class="view active">
    <div class="card">
      <div class="row" id="chat-config"></div>
    </div>
    <div class="card">
      <div class="row">
        <input type="text" id="chat-q" placeholder="例如：等待期多少天？甲状腺结节能不能保？"
               onkeydown="if(event.key==='Enter')Chat.send()">
        <button class="primary" id="chat-send" onclick="Chat.send()">提问</button>
      </div>
    </div>
    <div id="chat-out"></div>
  </section>

  <!-- Playground 对照视图 -->
  <section id="view-playground" class="view">
    <div class="card">
      <div class="row">
        <input type="text" id="pg-q" placeholder="同一问题，两套配置左右对照"
               onkeydown="if(event.key==='Enter')Playground.run()">
        <label class="dim"><input type="checkbox" id="pg-retrieve-only">只检索（不生成，快且免 LLM 费用）</label>
        <button class="primary" id="pg-send" onclick="Playground.run()">对比</button>
      </div>
    </div>
    <div class="cols">
      <div class="card"><b>配置 A</b><div class="row" id="pg-config-a"></div><div id="pg-out-a"></div></div>
      <div class="card"><b>配置 B</b><div class="row" id="pg-config-b"></div><div id="pg-out-b"></div></div>
    </div>
  </section>

  <!-- 语料视图：解析/切片质量可观测（chunk 浏览器 + 边界质检红旗） -->
  <section id="view-corpus" class="view">
    <div class="card">
      <div class="muted" style="margin-bottom:6px">入库文档总览 · 数据来自入库时生成的质量报告；
        历史文件补报告：<code>python scripts/ingest.py data/raw --reports-only</code>（零成本，不调 embedding）</div>
      <div id="corpus-docs"><p class="muted">加载中…</p></div>
    </div>
    <div class="card" id="corpus-browser" style="display:none">
      <div class="row" id="corpus-toolbar"></div>
      <div id="corpus-chunks"></div>
    </div>
  </section>

  <!-- 评测视图 -->
  <section id="view-eval" class="view">
    <div class="card">
      <div class="row">
        <select id="eval-history"><option>加载中…</option></select>
        <span class="muted">RAGAS 四指标 + 拒答准确率 + 成本/耗时；
          每次 `python eval/run_eval.py` 生成一份历史（{日期}_{git短hash}.json）。</span>
      </div>
      <div id="eval-table"></div>
    </div>
  </section>
</main>

<dialog id="chunk-dialog">
  <div id="chunk-dialog-body"></div>
  <div style="text-align:right;margin-top:10px">
    <button class="primary" onclick="document.getElementById('chunk-dialog').close()">关闭</button>
  </div>
</dialog>

<script>
"use strict";

/* ---------- 视图切换 ---------- */
document.querySelectorAll("nav button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-" + btn.dataset.view).classList.add("active");
  };
});

/* ---------- 配置控件 ---------- */
const DIM_LABELS = { chunking: "切片", retrieval: "检索", rerank: "重排" };
let DIMS = { chunking: ["fixed", "structural"], retrieval: ["vector", "hybrid"], rerank: [false, true] };

function renderConfig(el, defaults) {
  el.innerHTML = "";
  for (const [dim, options] of Object.entries(DIMS)) {
    const label = document.createElement("label");
    label.className = "dim";
    label.textContent = DIM_LABELS[dim] + " ";
    const sel = document.createElement("select");
    sel.dataset.dim = dim;
    options.forEach(o => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify(o);
      opt.textContent = dim === "rerank" ? (o ? "开" : "关") : o;
      sel.appendChild(opt);
    });
    if (defaults && dim in defaults) sel.value = JSON.stringify(defaults[dim]);
    label.appendChild(sel);
    el.appendChild(label);
  }
}
function readConfig(el) {
  const cfg = {};
  el.querySelectorAll("select").forEach(s => cfg[s.dataset.dim] = JSON.parse(s.value));
  return cfg;
}

/* ---------- 渲染工具 ---------- */
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

/* 检索溯源行：该 chunk 在向量/BM25/粗排/rerank 各阶段的名次与分数（后端未给的字段不显示） */
function provLine(c, pos) {
  const parts = [];
  if (c.vector_rank != null) parts.push(`向量 #${c.vector_rank} (${(+c.vector_score).toFixed(3)})`);
  if (c.bm25_rank != null) parts.push(`BM25 #${c.bm25_rank} (${(+c.bm25_score).toFixed(2)})`);
  if (c.retrieval_rank != null) parts.push(`粗排 #${c.retrieval_rank}`);
  if (c.rerank_score != null) {
    let move = "";
    if (c.retrieval_rank != null && pos != null && c.retrieval_rank !== pos)
      move = c.retrieval_rank > pos ? ` ↑${c.retrieval_rank - pos}` : ` ↓${pos - c.retrieval_rank}`;
    parts.push(`rerank ${(+c.rerank_score).toFixed(3)}${move}`);
  }
  return parts.length ? `<div class="prov">${parts.map(esc).join(" · ")}</div>` : "";
}

function resultCard(data, opts = {}) {
  const div = document.createElement("div");
  div.className = "card";
  const t = data.timings || {};
  const badges = [];
  if (data.refused) badges.push(`<span class="badge warn">拒答 · ${esc(data.refuse_reason)}</span>`);
  else if (opts.retrieveOnly) badges.push(`<span class="badge">仅检索</span>`);
  else badges.push(`<span class="badge ok">已回答</span>`);
  if (data.rerank_degraded) badges.push(`<span class="badge warn">rerank 降级</span>`);
  for (const k of ["retrieve_ms", "rerank_ms", "generate_ms", "total_ms"])
    if (k in t) badges.push(`<span class="badge">${k.replace("_ms", "")} ${t[k]}ms</span>`);

  const cites = (data.citations || []).map(c =>
    `<span class="cite" onclick="showChunk('${esc(c.chunk_id)}')">[${esc(c.label)}]</span>`).join("");

  const chunks = (data.chunks || []).map((c, i) => `
    <div class="chunk" id="chunk-${esc(c.chunk_id)}">
      <div class="meta">${esc(c.chunk_id)} · ${esc(c.product)}${c.section ? " · " + esc(c.section) : ""}
        · 第${c.page_start}${c.page_end !== c.page_start ? "-" + c.page_end : ""}页 · score ${(+c.score).toFixed(3)}</div>
      ${provLine(c, i + 1)}
      <div>${esc(c.text)}</div>
    </div>`).join("");

  div.innerHTML = `
    <div>${badges.join("")}</div>
    <div class="answer" data-role="answer">${esc(data.answer || "")}</div>
    <div data-role="cites">${cites}</div>
    <details${opts.retrieveOnly ? " open" : ""}><summary>检索到的 ${data.chunks ? data.chunks.length : 0} 个片段</summary>${chunks}</details>`;
  window._chunkStore = window._chunkStore || {};
  (data.chunks || []).forEach(c => window._chunkStore[c.chunk_id] = c);
  return div;
}

function showChunk(chunkId) {
  const c = (window._chunkStore || {})[chunkId];
  if (!c) return;
  const body = document.getElementById("chunk-dialog-body");
  body.innerHTML = `
    <div class="meta muted">${esc(c.chunk_id)} · ${esc(c.product)}
      ${c.section ? " · " + esc(c.section) : ""} · 第${c.page_start}页起</div>
    <p class="answer">${esc(c.text)}</p>`;
  const [product, strategy] = String(chunkId).split(":");
  if (product && strategy) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = "在语料中定位（看邻居块）";
    btn.onclick = () => {
      document.getElementById("chunk-dialog").close();
      showView("corpus");
      Corpus.open(product, strategy, chunkId);
    };
    body.appendChild(btn);
  }
  document.getElementById("chunk-dialog").showModal();
}

function showView(name) {
  document.querySelector(`nav button[data-view="${name}"]`).click();
}

/* ---------- SSE 解析（生产入口 /ask：config 服务端锁定，不随请求发送） ---------- */
async function askStream(question, handlers) {
  const resp = await fetch("/ask", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question, stream: true }),
  });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n\n")) >= 0) {
      const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
      let event = "", data = "";
      for (const line of frame.split("\n")) {
        if (line.startsWith("event: ")) event = line.slice(7);
        else if (line.startsWith("data: ")) data = line.slice(6);
      }
      if (event && handlers[event]) handlers[event](JSON.parse(data));
    }
  }
}

/* ---------- 问答视图（流式） ---------- */
const Chat = {
  send: async () => {
    const q = document.getElementById("chat-q").value.trim();
    if (!q) return;
    const btn = document.getElementById("chat-send");
    btn.disabled = true;
    const out = document.getElementById("chat-out");
    const holder = document.createElement("div");
    holder.className = "card";
    holder.innerHTML = `<div class="muted">Q：${esc(q)}</div><div class="answer" data-role="live"></div>`;
    out.prepend(holder);
    const live = holder.querySelector("[data-role=live]");
    let chunksData = null;
    try {
      await askStream(q, {
        chunks: d => { chunksData = d; },
        delta: d => { live.textContent += d.text; },
        final: d => { holder.replaceWith(wrapFinal(q, d, chunksData)); },
      });
    } catch (e) {
      live.textContent = "请求失败：" + e.message;
    } finally {
      btn.disabled = false;
    }
  },
};
function wrapFinal(q, finalData, chunksData) {
  const merged = Object.assign({}, finalData, { chunks: (chunksData || {}).chunks || [] });
  const card = resultCard(merged);
  const head = document.createElement("div");
  head.className = "muted";
  head.textContent = "Q：" + q;
  card.prepend(head);
  return card;
}

/* ---------- Playground（双配置非流式并发） ---------- */
const Playground = {
  run: async () => {
    const q = document.getElementById("pg-q").value.trim();
    if (!q) return;
    const btn = document.getElementById("pg-send");
    btn.disabled = true;
    const retrieveOnly = document.getElementById("pg-retrieve-only").checked;
    const jobs = [["a", "pg-config-a", "pg-out-a"], ["b", "pg-config-b", "pg-out-b"]].map(
      async ([_, cfgId, outId]) => {
        const out = document.getElementById(outId);
        out.innerHTML = '<p class="muted">运行中…</p>';
        try {
          const resp = await fetch(retrieveOnly ? "/retrieve" : "/playground/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q, config: readConfig(document.getElementById(cfgId)) }),
          });
          const data = await resp.json();
          out.innerHTML = "";
          out.appendChild(resultCard(data, { retrieveOnly }));
        } catch (e) {
          out.innerHTML = `<p class="muted">失败：${esc(e.message)}</p>`;
        }
      });
    await Promise.all(jobs);
    btn.disabled = false;
  },
};

/* ---------- 语料视图：文档总览 → 切片浏览器（异常过滤 + 边界质检条） ---------- */
const FLAG_LABELS = {
  cut_midsentence: "截断疑似", merged_clauses: "吞并疑似",
  no_clause: "无条号", overshort: "超短", overlong: "超长",
};
const FLAG_ORDER = ["cut_midsentence", "merged_clauses", "no_clause", "overshort", "overlong"];

const Corpus = {
  chunks: [], meta: {}, product: "", strategy: "structural", filter: "all", locate: null,

  init: async () => {
    const box = document.getElementById("corpus-docs");
    try {
      const { documents } = await (await fetch("/corpus")).json();
      if (!documents.length) {
        box.innerHTML = '<p class="muted">暂无报告，请先执行上方的 --reports-only 命令。</p>';
        return;
      }
      box.innerHTML = "";
      documents.forEach(d => {
        const row = document.createElement("div");
        row.className = "doc-row";
        const st = d.strategies || {};
        const cov = st.structural ? st.structural.clause_coverage : null;
        const parts = [`<b>${esc(d.product)}</b>`,
          `<span class="muted">${d.parsed_pages}/${d.total_pages} 页</span>`];
        if ((d.empty_pages || []).length)
          parts.push(`<span class="badge warn">空页 ${esc(d.empty_pages.join(","))}</span>`);
        for (const [name, e] of Object.entries(st))
          parts.push(`<span class="muted">${esc(name)} ${e.n_chunks} 块</span>`);
        if (cov != null) {
          const txt = `条号覆盖 ${(cov * 100).toFixed(0)}%`;
          parts.push(`<span class="badge ${cov < 0.5 ? "warn" : "ok"}">${txt}</span>`);
        }
        row.innerHTML = parts.join(" ");
        row.onclick = () => Corpus.open(d.product, Corpus.strategy);
        box.appendChild(row);
      });
    } catch (e) {
      box.innerHTML = `<p class="muted">加载失败：${esc(e.message)}</p>`;
    }
  },

  open: async (product, strategy, locateId) => {
    Corpus.product = product;
    Corpus.strategy = strategy || "structural";
    Corpus.filter = "all";
    Corpus.locate = locateId || null;
    document.getElementById("corpus-browser").style.display = "";
    const out = document.getElementById("corpus-chunks");
    out.innerHTML = '<p class="muted">加载中…</p>';
    try {
      const resp = await fetch(
        `/corpus/${encodeURIComponent(product)}/chunks?strategy=${Corpus.strategy}`);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      Corpus.meta = data;
      Corpus.chunks = data.chunks || [];
      Corpus.render();
    } catch (e) {
      out.innerHTML = `<p class="muted">加载失败：${esc(e.message)}（该策略可能未入库）</p>`;
    }
  },

  render: () => {
    const bar = document.getElementById("corpus-toolbar");
    bar.innerHTML = "";
    const covTxt = Corpus.meta.clause_coverage == null ? ""
      : ` · 条号覆盖 ${(Corpus.meta.clause_coverage * 100).toFixed(0)}%`;
    const title = document.createElement("span");
    title.innerHTML = `<b>${esc(Corpus.product)}</b><span class="muted"> · ${Corpus.chunks.length} 块${covTxt}</span>`;
    bar.appendChild(title);
    ["fixed", "structural"].forEach(s => {
      const chip = document.createElement("span");
      chip.className = "chip" + (s === Corpus.strategy ? " on" : "");
      chip.textContent = s;
      chip.onclick = () => Corpus.open(Corpus.product, s);
      bar.appendChild(chip);
    });
    const counts = Corpus.meta.flag_counts || {};
    const filters = [["all", `全部 ${Corpus.chunks.length}`]];
    FLAG_ORDER.forEach(f => { if (counts[f]) filters.push([f, `${FLAG_LABELS[f]} ${counts[f]}`]); });
    filters.forEach(([f, label]) => {
      const chip = document.createElement("span");
      chip.className = "chip" + (f === Corpus.filter ? " on" : "");
      chip.textContent = label;
      chip.onclick = () => { Corpus.filter = f; Corpus.render(); };
      bar.appendChild(chip);
    });

    const out = document.getElementById("corpus-chunks");
    out.innerHTML = "";
    const visible = Corpus.chunks.filter(
      c => Corpus.filter === "all" || (c.flags || []).includes(Corpus.filter));
    if (!visible.length) { out.innerHTML = '<p class="muted">无匹配块。</p>'; return; }
    visible.forEach(c => {
      const div = document.createElement("div");
      div.className = "cchunk";
      div.dataset.cid = c.chunk_id;
      const loc = c.clause || c.section || "";
      const pages = c.page_start === c.page_end ? `P${c.page_start}` : `P${c.page_start}-${c.page_end}`;
      const flags = (c.flags || []).map(f => `<span class="fbadge">${esc(FLAG_LABELS[f] || f)}</span>`).join("");
      const text = c.text || "";
      const more = text.length > 120
        ? `<details><summary>展开全文（${text.length} 字）</summary><div class="answer" style="margin-top:6px">${esc(text)}</div></details>`
        : "";
      div.innerHTML = `
        <div class="head">
          <span class="cid">#${esc(String(c.seq).padStart(4, "0"))}</span>
          ${loc ? `<span class="clause-tag">${esc(loc)}</span>` : ""}
          <span class="muted">${pages} · ${c.chars} 字</span>
          ${flags}
          <span style="margin-left:auto"></span>
          <button class="chip" data-act="pg">去 Playground 检索</button>
        </div>
        <div class="body"><div>${esc(text.slice(0, 120))}${text.length > 120 ? "…" : ""}</div>${more}</div>`;
      if (c.boundary && c.boundary.cut
          && (Corpus.filter === "all" || Corpus.filter === "cut_midsentence")) {
        const b = document.createElement("div");
        b.className = "boundary";
        b.innerHTML = `边界落在句中：<code>…${esc(c.boundary.tail)}</code> ‖ <code>${esc(c.boundary.next_head)}…</code>`;
        div.appendChild(b);
      }
      out.appendChild(div);
    });
    if (Corpus.locate) {
      const target = out.querySelector(`[data-cid="${CSS.escape(Corpus.locate)}"]`);
      if (target) {
        target.scrollIntoView({ block: "center" });
        target.classList.add("flash");
        setTimeout(() => target.classList.remove("flash"), 1600);
      }
      Corpus.locate = null;
    }
  },
};

// 「去 Playground 检索」事件委托：chunk 内容不进 HTML 属性，规避注入面
document.getElementById("corpus-chunks").addEventListener("click", ev => {
  const btn = ev.target.closest("button[data-act=pg]");
  if (!btn) return;
  const card = btn.closest(".cchunk");
  const c = Corpus.chunks.find(x => x.chunk_id === card.dataset.cid);
  if (!c) return;
  const seed = (c.clause || c.section || c.text || "").split(/[。！？\n]/)[0].slice(0, 40);
  document.getElementById("pg-q").value = seed;
  showView("playground");
  document.getElementById("pg-q").focus();
});

/* ---------- 评测表 ---------- */
const Eval = {
  init: async () => {
    const sel = document.getElementById("eval-history");
    try {
      const { files } = await (await fetch("/eval_results")).json();
      sel.innerHTML = "";
      if (!files.length) {
        sel.appendChild(new Option("暂无评测结果（先跑 run_eval.py）", ""));
        return;
      }
      files.forEach(f => sel.appendChild(new Option(f, f)));
      sel.onchange = () => Eval.load(sel.value);
      Eval.load(files[0]);  // 默认最新
    } catch (e) {
      sel.innerHTML = "";
      sel.appendChild(new Option("加载失败", ""));
    }
  },
  load: async (name) => {
    if (!name) return;
    const data = await (await fetch("/eval_results/" + encodeURIComponent(name))).json();
    const metrics = data.requested_metrics || [];
    const head = ["切片", "检索", "重排", ...metrics, "拒答准确率", "成本(¥)", "耗时(s)"];
    const rows = (data.configs || []).map(e => {
      const c = e.config, m = e.metrics || {};
      const cells = [c.chunking, c.retrieval, c.rerank ? "开" : "关",
        ...metrics.map(k => m[k] == null ? "—" : m[k]),
        e.refusal_accuracy == null ? "—" : e.refusal_accuracy,
        e.cost_cny, e.duration_s];
      return `<tr>${cells.map(x => `<td style="padding:6px 10px;border-top:1px solid var(--line)">${esc(String(x))}</td>`).join("")}</tr>`;
    }).join("");
    document.getElementById("eval-table").innerHTML = `
      <p class="muted">run_at ${esc(data.run_at || "")} · git ${esc(data.git || "")}
        · ${data.n_questions || 0} 题 · 总成本 ¥${data.total_cost_cny}
        · 总耗时 ${data.total_duration_s}s</p>
      <div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:13px">
        <tr>${head.map(h => `<th style="text-align:left;padding:6px 10px">${esc(h)}</th>`).join("")}</tr>
        ${rows}
      </table></div>`;
  },
};

/* ---------- 初始化 ---------- */
(async () => {
  let prod = { chunking: "structural", retrieval: "hybrid", rerank: true };
  try {
    const resp = await fetch("/configs");
    if (resp.ok) {
      const body = await resp.json();
      if (body.production) prod = body.production;
      DIMS = { chunking: body.chunking, retrieval: body.retrieval, rerank: body.rerank };
    }
  } catch (e) { /* 用内置默认 */ }
  // 问答视图不再提供 config 选择：/ask 由服务端锁定（安全开关不进请求体）
  document.getElementById("chat-config").innerHTML =
    `<span class="muted">生产配置（服务端锁定）：${esc(prod.chunking)} · ${esc(prod.retrieval)} · rerank ${prod.rerank ? "开" : "关"}　—　自由切换请用 Playground</span>`;
  renderConfig(document.getElementById("pg-config-a"),
               { chunking: "fixed", retrieval: "vector", rerank: false });      // baseline
  renderConfig(document.getElementById("pg-config-b"), prod);                  // 生产同款
  Eval.init();
  Corpus.init();
})();
</script>
