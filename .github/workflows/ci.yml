name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # 最小权限：所有 job 只读仓库

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test with coverage gate
        # 当前 app/ 覆盖率 98%（2026-07-04），门槛 90 留合理余量；
        # 跌破意味着大段生产代码失去测试（如曾经零覆盖的 complete_with_usage）
        run: pytest --cov=app --cov-fail-under=90

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit locked dependencies
        # PYSEC-2026-311（chromadb 1.5.9）：官方尚无修复版本，显式豁免并
        # 定期复查（见 docs/TODO.md 风险备忘）；其余任何新披露漏洞都会挡 CI
        run: |
          pip install pip-audit==2.10.1
          pip-audit --no-deps -r requirements.lock --ignore-vuln PYSEC-2026-311

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stub index artifacts
        # 真实索引不入 git（红线）；构建只需要 COPY 目标存在。
        # 这个 job 专治「本地能构建、部署日才炸」——Dockerfile 改坏当场红
        run: |
          mkdir -p data/index/chroma
          touch data/index/bm25_fixed.pkl data/index/bm25_structural.pkl \
                data/index/ingest_manifest.json data/index/chroma/placeholder
      - name: Build image
        run: docker build -t insurance-rag:ci .

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史扫描：密钥一旦进过历史就算泄露
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
